server.port: 7000

spring:
  application.name: gateway
  config:
    import: optional:file:.env[.properties]
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Methods Access-Control-Allow-Headers Access-Control-Allow-Credentials RETAIN_FIRST 
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins:
                  - ${CORS_ORIGIN1}
                  - ${CORS_ORIGIN2}
                allow-credentials: true
                allowedHeaders: 
                  - '*'
                allowedMethods:
                  - PUT
                  - GET
                  - POST
                  - PATCH
                  - DELETE
                  - OPTIONS
          routes:
            - id: main-service
              uri: ${ROUTE_MAIN_URI}
              predicates:
                - Host=main.weareithero.cloud**
              filters:
                - ApiFilter
            - id: skm-service
              uri: ${ROUTE_SKM_URI}
              predicates:
                - Host=skm.weareithero.cloud**
              filters:
                - ApiFilter
            - id: hg-service
              uri: ${ROUTE_HG_URI}
              predicates:
                - Host=hg.weareithero.cloud**
              filters:
                - ApiFilter
            - id: tv-service
              uri: ${ROUTE_TV_URI}
              predicates:
                - Host=tv.weareithero.cloud**
              filters:
                - ApiFilter

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: gateway
  tracing:
    enabled: false
    sampling:
      probability: 1.0

springdoc:
  swagger-ui:
    # use-root-path: true
    path: /gateway-docs
    operationsSorter: method

logging.level.org.springframework: INFO

# logging:
#   level:
#     org.springframework.cloud.gateway: DEBUG
#     org.springframework.http.server.reactive: DEBUG
#     org.springframework.web.reactive: DEBUG

api-origin-uri: ${CORS_ORIGIN}
