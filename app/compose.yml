services:

  gateway:
    image: maven:3.9.15-eclipse-temurin-21-alpine
    container_name: gateway
    restart: always 
    networks:
      - main_with-network
    # ports:
    #   - 7000:7000
    environment:
      - CORS_ORIGIN1=http://weareithero.cloud
      - CORS_ORIGIN2=http://*.weareithero.cloud
      - ROUTE_MAIN_URI=http://192.168.0.205:8000
      - ROUTE_SKM_URI=http://192.168.0.201:8000
      - ROUTE_HG_URI=http://192.168.0.204:8000
      - ROUTE_TV_URI=http://192.168.0.203:8000
    volumes:
      - ./gateway/target:/usr/local/work/app
    command: ["java","-jar","/usr/local/work/app/gateway-0.0.1-SNAPSHOT.jar"]

  frontend:
    container_name: frontend
    image: nginx:1.28
    restart: always
    networks:
      - main_with-network
    # ports:
    #   - 80:80
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    container_name: backend
    image: uv:1
    restart: always 
    networks:
      - main_with-network
    ports:
      - 8000:8000
    # depends_on:
    #   - mariadb
    working_dir: /workspace
    volumes:
      - ./backend/main.py:/workspace/main.py
      # - ./backend/settings.py:/workspace/settings.py
      - ./backend/pyproject.toml:/workspace/pyproject.toml
      - ./backend/uv.lock:/workspace/uv.lock
      - ./backend/.python-version:/workspace/.python-version
      - ./backend/src:/workspace/src
      - auth_keys:/workspace/secrets
    environment:
      - HOST_IP=http://weareithero.cloud
      - KAFKA_SERVER=${KAFKA_SERVER}
      - KAFKA_TOPIC=${KAFKA_TOPIC}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - MAIL_FROM=${MAIL_FROM}
      - MARIA_DB_DATABASE=${MARIA_DB_DATABASE}
      - MARIA_DB_USER=${MARIA_DB_USER}
      - MARIA_DB_PASSWORD=${MARIA_DB_PASSWORD}
      - MARIA_DB_HOST=${MARIA_DB_HOST}
      - MARIA_DB_PORT=${MARIA_DB_PORT}
      - ACCESS_TOKEN_EXPIRE_MINUTES=${ACCESS_TOKEN_EXPIRE_MINUTES}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS}
      - REDIS_HOST=${REDIS_HOST}
      - REDIS_PORT=${REDIS_PORT}
      - REDIS_DB1=${REDIS_DB1}
      - REDIS_DB2=${REDIS_DB2}
      - SERVICE_KEY=${SERVICE_KEY}
    command: ["uv", "run", "fastapi", "run"]

networks:
  main_with-network: 
    external: true

volumes:
  data-mariadb:
  auth_keys:
    external: true
