global:
  scrape_interval: 10s

scrape_configs:
  - job_name: "fastapi-main-monitoring"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["main.weareithero.cloud"]
  - job_name: "fastapi-skm-monitoring"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["skm.weareithero.cloud"]
  - job_name: "fastapi-hg-monitoring"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["hg.weareithero.cloud"]
  - job_name: "fastapi-tv-monitoring"
    metrics_path: "/metrics"
    static_configs:
      - targets: ["tv.weareithero.cloud"]
  - job_name: "gateway-monitoring"
    metrics_path: "/actuator/prometheus"
    static_configs:
      - targets: ["main.weareithero.cloud"]

